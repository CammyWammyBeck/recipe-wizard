[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    live_openai: tests that hit the real OpenAI API (skipped unless RUN_LIVE_OPENAI=1)
